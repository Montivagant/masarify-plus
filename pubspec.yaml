name: masarify
description: Offline-first personal money tracking app for Egyptian and MENA users.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Database ─────────────────────────────────────────────────────────────────
  drift: ^2.20.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.4

  # ── State Management ─────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1

  # ── Navigation ───────────────────────────────────────────────────────────────
  go_router: ^14.3.0

  # ── UI & Animations ──────────────────────────────────────────────────────────
  flutter_markdown: ^0.7.4+3
  flutter_animate: ^4.5.0
  lottie: ^3.3.2
  shimmer: ^3.0.0
  flex_color_scheme: ^8.4.0
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0
  flutter_slidable: ^3.1.1
  phosphor_flutter: ^2.1.0

  # ── Maps ─────────────────────────────────────────────────────────────────────
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # ── Charts ───────────────────────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Localization & Formatting ─────────────────────────────────────────────────
  intl: ^0.20.0

  # ── Notifications ────────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # ── Calendar ─────────────────────────────────────────────────────────────────
  table_calendar: ^3.1.2

  # ── Security ─────────────────────────────────────────────────────────────────
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # ── Export ───────────────────────────────────────────────────────────────────
  pdf: ^3.11.1
  share_plus: ^10.0.0
  csv: ^6.0.0
  file_picker: ^8.1.2

  # ── Utilities ────────────────────────────────────────────────────────────────
  crypto: ^3.0.5
  shared_preferences: ^2.3.2
  package_info_plus: ^8.1.0
  device_info_plus: ^11.0.0

  # ── Permissions ──────────────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Voice Input (audio recording → Gemini API) ──────────────────────────────
  record: ^6.2.0

  # ── AI / OpenRouter ─────────────────────────────────────────────────────────
  http: ^1.2.2

  # ── Google Drive Backup ────────────────────────────────────────────────────
  google_sign_in: ^6.2.1
  googleapis: ^14.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  encrypt: ^5.0.3

  # ── Location ─────────────────────────────────────────────────────────────────
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  rxdart: ^0.28.0
  connectivity_plus: ^7.0.0

  # ── In-App Purchases ───────────────────────────────────────────────────────
  in_app_purchase: ^3.2.0

  # ── URL Launcher ───────────────────────────────────────────────────────────
  url_launcher: ^6.3.1
  flutter_timezone: ^5.0.2
  flutter_svg: ^2.2.4
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.20.0
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"
  web: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/animations/
    - assets/icons/
    - assets/images/
    - assets/dictionaries/
    # M-14: Arabic font for PDF export. Download NotoSansArabic-Regular.ttf
    # from https://fonts.google.com/noto/specimen/Noto+Sans+Arabic and place here.
    - assets/fonts/
